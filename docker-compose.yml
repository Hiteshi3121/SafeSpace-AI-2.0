# ── docker-compose.yml ────────────────────────────────────────────────────────
# Local development only — Railway uses the Dockerfile directly.
#
# Two services:
#   api       → FastAPI on port 8000 (WhatsApp webhook)
#   streamlit → Streamlit UI on port 8501
#
# Both share the same codebase and .env file.
# SQLite data is persisted via a named volume.
#
# HOW TO USE:
#   docker compose up           → start both services
#   docker compose up api       → start only FastAPI
#   docker compose down         → stop everything
#   docker compose logs -f api  → tail FastAPI logs

version: "3.9"

services:

  # ── FastAPI (WhatsApp webhook + core engine) ────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: safespace_api
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - safespace_data:/app/data    # Persist SQLite DB across restarts
      - .:/app                      # Mount code for hot reload in dev
    environment:
      - APP_ENV=development
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # ── Streamlit UI ─────────────────────────────────────────────────────────────
  streamlit:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: safespace_streamlit
    ports:
      - "8501:8501"
    env_file:
      - .env
    volumes:
      - safespace_data:/app/data
      - .:/app
    command: streamlit run interfaces/streamlit_ui/app.py --server.port 8501 --server.address 0.0.0.0
    depends_on:
      - api
    restart: unless-stopped

volumes:
  safespace_data:
    driver: local
